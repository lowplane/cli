# Demo chart — exercises every Year-1 detector.
# - api         cpu-overprovisioned + memory-overprovisioned + run-as-root (unset)
# - worker      missing-memory-limit + missing-cpu-limit
# - cache       image-pinned-latest (Tag: latest)
# - logger      image-pinned-latest (no tag)
# - shipper     replicas-too-high (10 replicas, no HPA)
# - admin-tool  privileged-container + run-as-root (explicit)
# - sniffer     host-network
# - clean       fully right-sized + secure; produces no findings

api:
  image:
    repository: example/api
    tag: "1.4.2"
  replicas: 3
  resources:
    requests:
      cpu: "2"
      memory: "1.6Gi"
    limits:
      cpu: "2.5"
      memory: "2Gi"

worker:
  image: example/worker:0.9.0
  replicas: 2
  resources:
    requests:
      cpu: "500m"
      memory: "1Gi"
  # Workload sets runAsNonRoot so it doesn't trip the security detector
  # along with the resource ones we want to exercise.
  securityContext:
    runAsNonRoot: true

cache:
  image:
    repository: redis
    tag: "latest"
  replicas: 1
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
  securityContext:
    runAsNonRoot: true

logger:
  image: fluentd
  replicas: 1
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
  securityContext:
    runAsNonRoot: true

shipper:
  image:
    repository: example/shipper
    tag: "v2.1.0"
  replicas: 10
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
  securityContext:
    runAsNonRoot: true

admin-tool:
  image:
    repository: example/admin
    tag: "v0.4.0"
  replicas: 1
  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "100m"
      memory: "128Mi"
  securityContext:
    privileged: true
    runAsNonRoot: false

sniffer:
  image:
    repository: example/sniffer
    tag: "v1.0.0"
  replicas: 1
  hostNetwork: true
  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "100m"
      memory: "128Mi"
  securityContext:
    runAsNonRoot: true

clean:
  image:
    repository: example/clean
    tag: "v3.2.1"
  replicas: 1
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
  securityContext:
    runAsNonRoot: true
